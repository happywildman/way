name: S

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: P
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: I
        run: pip install pyyaml requests geoip2
      
      - name: G
        run: |
          if [ ! -f c.mmdb ]; then
            curl -L -o c.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/country.mmdb
          fi
      
      - name: F
        id: f
        run: |
          python filter.py
          if [ -f out.yaml ]; then
            echo "ok=1" >> $GITHUB_OUTPUT
            echo "c=$(grep -c "type: vless" out.yaml)" >> $GITHUB_OUTPUT
          else
            echo "ok=0" >> $GITHUB_OUTPUT
            echo "c=0" >> $GITHUB_OUTPUT
          fi
      
      - name: C
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "action"
          git add out.yaml s.txt t.txt c.mmdb 2>/dev/null || true
          git diff --staged --quiet || git commit -m "u"
          git push
      
      - name: T
        if: ${{ secrets.TG != '' }}
        env:
          TG: ${{ secrets.TG }}
          ID: ${{ secrets.ID }}
        run: |
          C="${{ steps.f.outputs.c }}"
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d "chat_id=${ID}" \
            -d "text=${C}" \
            -d "disable_web_page_preview=true"
