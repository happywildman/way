name: Start

on:
  # По расписанию - дважды в сутки
  schedule:
    - cron: '0 0,12 * * *'  # в 00:00 и 12:00 UTC
  # По требованию - можно запустить вручную
  workflow_dispatch:
    inputs:
      force_geoip:
        description: 'Force GeoIP update'
        type: boolean
        default: false
      notify:
        description: 'Send Telegram notification'
        type: boolean
        default: true

# Разрешаем запись в репозиторий
permissions:
  contents: write

jobs:
  filter:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests geoip2
      
      - name: GeoIP check
        id: geoip
        run: |
          if [ "${{ github.event.inputs.force_geoip }}" == "true" ]; then
            echo "force=true" >> $GITHUB_OUTPUT
            rm -f country.mmdb
          fi
          
          if [ ! -f country.mmdb ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            # Обновляем раз в неделю
            age=$(( ($(date +%s) - $(stat -c %Y country.mmdb)) / 86400 ))
            echo "age=$age" >> $GITHUB_OUTPUT
            if [ $age -gt 7 ]; then
              echo "old=true" >> $GITHUB_OUTPUT
              rm -f country.mmdb
            fi
          fi
      
      - name: Run filter
        id: filter
        run: |
          echo "🚀 Запуск filter.py..."
          START_TIME=$(date +%s)
          python filter.py
          END_TIME=$(date +%s)
          
          # Результаты
          if [ -f out.yaml ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            COUNT=$(grep -c "type: vless" out.yaml || echo 0)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi
          
          # Время выполнения
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "time=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          
          # Статистика
          if [ -f stat.txt ]; then
            echo "stat=ok" >> $GITHUB_OUTPUT
            # Извлекаем топ-3 страны для быстрого доступа
            TOP_COUNTRIES=$(grep -A 10 "🌍 BY COUNTRY" stat.txt | grep -E "^[🇺🇸🇬🇧🇩🇪]" | head -3 | tr '\n' ';')
            echo "top_countries=$TOP_COUNTRIES" >> $GITHUB_OUTPUT
          else
            echo "stat=fail" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавляем измененные файлы
          git add out.yaml stat.txt trash.txt country.mmdb 2>/dev/null || true
          
          if ! git diff --staged --quiet; then
            COUNT="${{ steps.filter.outputs.count }}"
            git commit -m "🔄 update: $COUNT proxies [skip ci]"
            git push
            echo "✅ Изменения сохранены"
          else
            echo "ℹ️ Нет изменений"
          fi
      
      - name: Telegram notification
        if: ${{ (github.event.inputs.notify == 'true' || github.event.schedule) && secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COUNT="${{ steps.filter.outputs.count }}"
          DURATION="${{ steps.filter.outputs.duration }}"
          TIME="${{ steps.filter.outputs.time }}"
          TOP="${{ steps.filter.outputs.top_countries }}"
          
          if [ "$COUNT" -gt 0 ]; then
            EMOJI="✅"
            STATUS="OK"
          else
            EMOJI="❌"
            STATUS="FAIL"
          fi
          
          # Форматируем время
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=HTML" \
            -d "text=${EMOJI} <b>Filter Update</b>
          
          <b>Status:</b> ${STATUS}
          <b>Proxies:</b> ${COUNT}
          <b>Time:</b> ${MIN}м ${SEC}с
          <b>Top:</b> ${TOP:-No data}
          
          <a href='https://github.com/${{ github.repository }}/blob/main/out.yaml'>out.yaml</a> | <a href='https://github.com/${{ github.repository }}/blob/main/stat.txt'>stat.txt</a>"
      
      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: filter-logs
          path: |
            *.log
            !country.mmdb
          retention-days: 3
