name: Power

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp  # ← ДОБАВЛЕНО
      
      - name: Run collector
        run: python filter.py
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          for file in out.txt 500.txt stat.txt all.txt; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          git diff --quiet && git diff --staged --quiet || git commit -m "📅 Автоматическое обновление подписок от $(date +'%Y-%m-%d')"
          git push
