name: VLESS Reality Collector

on:
  schedule:
    # Запуск каждый день в 3:00 UTC
    - cron: '0 3 * * *'
  # Возможность ручного запуска
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Нет внешних зависимостей, только стандартная библиотека
      
      - name: Run collector
        run: python filter.py
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add out.txt 500.txt stat.txt trash.txt stats_history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📅 Автоматическое обновление подписок от $(date +'%Y-%m-%d')"
          git push
